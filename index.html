<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quà 1/6 Cho Em Bé Phạm Lê Anh Thư 💖</title>
    <!-- Nhúng các font chữ phong cách điện ảnh lãng mạn -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #03000a;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px; /* Tăng độ sâu không gian 3D */
            font-family: 'Quicksand', sans-serif;
        }

        /* ----------------------------------------------------
           1. NỀN THIÊN HÀ LẤP LÁNH & CHUYỂN ĐỘNG DYNAMIC
           ---------------------------------------------------- */
        .stars-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #120022 0%, #03000a 100%);
            z-index: 1;
            overflow: hidden;
        }

        /* Dải sương mù ngân hà chuyển màu chậm rãi */
        .nebula-cloud {
            position: absolute;
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 0, 128, 0.08) 0%, rgba(120, 0, 255, 0.05) 50%, rgba(0, 0, 0, 0) 70%);
            filter: blur(80px);
            pointer-events: none;
            z-index: 1;
            animation: nebulaDrift 20s infinite alternate ease-in-out;
        }

        @keyframes nebulaDrift {
            0% { transform: translate(-10%, -10%) scale(1); }
            100% { transform: translate(10%, 10%) scale(1.2); }
        }

        /* Các vì sao lấp lánh tĩnh */
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: blink var(--duration) infinite ease-in-out;
            opacity: 0.3;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px #ffb3d9, 0 0 20px #fff; }
        }

        /* Hạt bụi sao chuyển động trôi nổi chậm (Stardust) */
        .stardust {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
            animation: drift var(--drift-duration) linear infinite;
        }

        @keyframes drift {
            0% {
                transform: translateY(105vh) translateX(0) scale(0.5);
                opacity: 0;
            }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% {
                transform: translateY(-5vh) translateX(var(--drift-x)) scale(1.2);
                opacity: 0;
            }
        }

        /* Cấu trúc Sao Băng rơi */
        .shooting-star {
            position: absolute;
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255, 179, 217, 1) 0%, rgba(255, 255, 255, 0) 100%);
            transform: rotate(-35deg);
            opacity: 0;
            pointer-events: none;
            z-index: 2;
            animation: shoot linear forwards;
        }

        @keyframes shoot {
            0% { transform: translate(0, 0) rotate(-35deg) scale(0); opacity: 0; }
            15% { opacity: 1; transform: translate(-30px, 21px) rotate(-35deg) scale(1); }
            100% { transform: translate(-500px, 350px) rotate(-35deg) scale(0.3); opacity: 0; }
        }

        /* ----------------------------------------------------
           2. MÀN HÌNH KHỞI ĐẦU: TRÁI TIM ĐẬP & HIỆU ỨNG VỠ TAN
           ---------------------------------------------------- */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #030005;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            transition: opacity 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: hidden;
        }

        #start-screen h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            margin-bottom: 50px;
            color: #ffccd5;
            text-shadow: 0 0 20px rgba(255, 26, 140, 0.8);
            text-align: center;
            padding: 0 20px;
            animation: textGlowPulse 3s infinite alternate;
        }

        @keyframes textGlowPulse {
            0% { text-shadow: 0 0 15px rgba(255, 26, 140, 0.6); }
            100% { text-shadow: 0 0 35px rgba(255, 26, 140, 1), 0 0 10px #fff; }
        }

        /* Trái tim hồng đập nhịp nhàng */
        .heart-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            cursor: pointer;
            z-index: 10;
        }

        .beating-heart {
            width: 100%;
            height: 100%;
            fill: #ff2a85;
            filter: drop-shadow(0 0 15px #ff1a8c) drop-shadow(0 0 30px #9900ff);
            animation: heartBeat 1.2s infinite cubic-bezier(0.215, 0.610, 0.355, 1);
            transform-origin: center;
            transition: transform 0.2s ease;
        }

        .heart-wrapper:hover .beating-heart {
            fill: #ff529a;
            filter: drop-shadow(0 0 25px #ff1a8c) drop-shadow(0 0 45px #ffb3d9);
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.22); }
            30% { transform: scale(1.05); }
            45% { transform: scale(1.25); }
            70% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        /* Các mảnh sao vỡ tan khi click trái tim */
        .shattered-particle {
            position: absolute;
            pointer-events: none;
            font-size: 1.5rem;
            color: #ffb3d9;
            z-index: 9999;
            text-shadow: 0 0 8px #ff1a8c, 0 0 15px #fff;
            animation: explodeParticle var(--exp-dur) cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        }

        @keyframes explodeParticle {
            0% {
                transform: translate(0, 0) scale(1.5) rotate(0deg);
                opacity: 1;
            }
            80% {
                opacity: 0.9;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--rot));
                opacity: 0;
            }
        }

        /* ----------------------------------------------------
           3. HIỆU ỨNG CHỮ CHẠY ĐIỆN ẢNH (CINEMATIC LYRICS)
           ---------------------------------------------------- */
        #intro-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            pointer-events: none;
        }

        .intro-text {
            font-family: 'Dancing Script', cursive;
            color: #fff;
            text-align: center;
            opacity: 0;
            filter: blur(15px);
            transform: scale(0.85);
            transition: all 1.8s cubic-bezier(0.25, 1, 0.5, 1);
            position: absolute;
            width: 90%;
            max-width: 800px;
            pointer-events: none;
        }

        .intro-text.style-1 {
            font-size: 3.5rem;
            text-shadow: 0 0 25px rgba(255, 179, 217, 0.9), 0 0 45px rgba(255, 26, 140, 0.6);
            color: #ffccd5;
        }

        .intro-text.style-2 {
            font-size: 4rem;
            text-shadow: 0 0 30px rgba(255, 26, 140, 0.9), 0 0 60px rgba(153, 0, 255, 0.8);
            background: linear-gradient(45deg, #ff80df, #ff1a8c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.4;
        }

        .intro-text.active {
            opacity: 1;
            filter: blur(0px);
            transform: scale(1);
        }

        .intro-text.disperse {
            opacity: 0;
            filter: blur(25px);
            transform: scale(1.15);
        }

        /* ----------------------------------------------------
           4. KHÔNG GIAN 3D & ẢNH ĐÃ TĂNG KÍCH THƯỚC (SPHERE PHOTO)
           ---------------------------------------------------- */
        .scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .sphere-container {
            position: relative;
            width: 350px; /* Tăng nhẹ kích thước container */
            height: 350px;
            transform-style: preserve-3d;
            transition: transform 1s ease;
        }

        /* TĂNG KÍCH THƯỚC HÌNH ẢNH TO VÀ LỘNG LẪY HƠN */
        .photo-item {
            position: absolute;
            width: 130px; /* Tăng từ 90px lên 130px */
            height: 173px; /* Tăng từ 120px lên 173px (Tỷ lệ 3:4 chuẩn) */
            object-fit: cover;
            border-radius: 16px; /* Bo góc mượt mà hơn */
            border: 2px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 20px rgba(255, 26, 140, 0.9), 0 0 40px rgba(153, 0, 255, 0.5);
            opacity: 0;
            transform: translate3d(0, 0, 0) scale(0);
            transition: opacity 2s, transform 2.5s cubic-bezier(0.25, 1, 0.5, 1);
            backface-visibility: visible;
            cursor: grab;
            touch-action: none;
        }

        .photo-item:active {
            cursor: grabbing;
        }

        /* ----------------------------------------------------
           5. THỜI KHẮC CUỐI & HỘP THƯ TAY (GLASSMORPHISM)
           ---------------------------------------------------- */
        #main-name {
            position: absolute;
            bottom: 22%;
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #fff;
            text-shadow: 0 0 20px #ff1a8c, 0 0 40px #9900ff;
            opacity: 0;
            transition: opacity 2s ease;
            z-index: 10;
            text-align: center;
            width: 100%;
            pointer-events: none;
        }

        #btn-open-letter {
            position: absolute;
            bottom: 11%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(45deg, rgba(255, 26, 140, 0.3), rgba(153, 0, 255, 0.3));
            border: 2px solid #ffb3d9;
            color: #ffb3d9;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            opacity: 0;
            transition: all 0.5s ease;
            z-index: 10;
            box-shadow: 0 0 15px rgba(255, 26, 140, 0.3);
        }
        
        #btn-open-letter:hover {
            background: #ffb3d9;
            color: #03000a;
            box-shadow: 0 0 30px #ffb3d9;
            transform: translateX(-50%) scale(1.05);
        }

        /* Hộp thư kính mờ cao cấp */
        #letter-modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.85);
            background: rgba(15, 5, 25, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 45px 35px;
            border-radius: 25px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 50px rgba(255, 26, 140, 0.5);
            color: #fff;
        }
        
        #letter-modal.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        /* Vùng nội dung chữ gõ máy tính */
        .letter-content {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 25px;
            text-align: justify;
            text-justify: inter-word;
            min-height: 180px;
        }

        /* Con trỏ soạn thảo đang nhấp nháy */
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.3rem;
            background-color: #ff1a8c;
            margin-left: 3px;
            vertical-align: middle;
            animation: cursorBlink 0.8s infinite alternate;
        }

        @keyframes cursorBlink {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        
        .close-btn {
            background: none;
            border: none;
            color: #ffb3d9;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.3s;
        }
        .close-btn:hover {
            color: #ff1a8c;
        }

        /* ----------------------------------------------------
           6. HỖ TRỢ THIẾT BỊ DI ĐỘNG (MOBILE RESPONSIVE)
           ---------------------------------------------------- */
        @media (max-width: 600px) {
            .photo-item {
                width: 100px; /* Tăng từ 75px lên 100px trên mobile */
                height: 133px; /* Tỷ lệ 3:4 tương ứng */
            }
            .sphere-container {
                width: 250px;
                height: 250px;
            }
            #start-screen h1 {
                font-size: 2.3rem;
            }
            .heart-wrapper {
                width: 110px;
                height: 110px;
            }
            .intro-text.style-1 {
                font-size: 2.5rem;
            }
            .intro-text.style-2 {
                font-size: 2.6rem;
            }
            #main-name {
                font-size: 2.8rem;
                bottom: 24%;
            }
            #btn-open-letter {
                font-size: 1.05rem;
                padding: 12px 30px;
                bottom: 13%;
            }
        }
    </style>
</head>
<body>

    <!-- Nhạc nền chất lượng cao -->
    <audio id="bgMusic" src="nhac.mp3" loop></audio>

    <!-- MÀN HÌNH KHỞI ĐỘNG: TRÁI TIM ĐẬP NHỊP SANG TRỌNG -->
    <div id="start-screen">
        <h1>Quà Quốc Tế Thiếu Nhi ✨</h1>
        <div class="heart-wrapper" id="heartTrigger" onclick="shatterHeartAndStart(event)">
            <svg class="beating-heart" viewBox="0 0 32 29.6">
                <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
                c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
            </svg>
        </div>
        <p style="margin-top: 30px; color: #ffb3d9; font-style: italic; letter-spacing: 1px; font-size: 1rem; animation: pulseGlow textGlowPulse 1.5s infinite alternate;">Chạm vào trái tim hồng để mở quà...</p>
    </div>

    <!-- Hệ thống cực quang và sao nền chuyển động lấp lánh -->
    <div class="stars-wrapper" id="starsContainer">
        <div class="nebula-cloud"></div>
    </div>

    <!-- Khu vực giới thiệu chữ điện ảnh chuyển đổi -->
    <div id="intro-container">
        <div class="intro-text style-1" id="text-1">Gửi em bé bé nhỏ của anh... 🤍</div>
        <div class="intro-text style-2" id="text-2">Chúc Mừng Ngày<br>Quốc Tế Thiếu Nhi 1/6 ✨</div>
    </div>

    <!-- Không gian chứa quả cầu 3D tương tác -->
    <div class="scene">
        <div class="sphere-container" id="sphere">
            <!-- 15 bức ảnh sẵn sàng cho sự kiện chuyển động -->
            <img src="anh1.jpg" class="photo-item" alt="anh">
            <img src="anh2.jpg" class="photo-item" alt="anh">
            <img src="anh3.jpg" class="photo-item" alt="anh">
            <img src="anh4.jpg" class="photo-item" alt="anh">
            <img src="anh5.jpg" class="photo-item" alt="anh">
            <img src="anh6.jpg" class="photo-item" alt="anh">
            <img src="anh7.jpg" class="photo-item" alt="anh">
            <img src="anh8.jpg" class="photo-item" alt="anh">
            <img src="anh9.jpg" class="photo-item" alt="anh">
            <img src="anh10.jpg" class="photo-item" alt="anh">
            <img src="anh11.jpg" class="photo-item" alt="anh">
            <img src="anh12.jpg" class="photo-item" alt="anh">
            <img src="anh13.jpg" class="photo-item" alt="anh">
            <img src="anh14.jpg" class="photo-item" alt="anh">
            <img src="anh15.jpg" class="photo-item" alt="anh">
        </div>
    </div>

    <!-- Tên chủ nhân và nút kích hoạt xem thư tay -->
    <div id="main-name">Phạm Lê Anh Thư 💖</div>
    <button id="btn-open-letter" onclick="toggleLetter(true)">Mở lá thư của anh 💌</button>

    <!-- Hộp thoại thư tình mờ ảo -->
    <div id="letter-modal">
        <div class="letter-content" id="letterText"></div>
        <button class="close-btn" onclick="toggleLetter(false)">Đóng lá thư</button>
    </div>

    <script>
        // ----------------------------------------------------
        // KHỞI TẠO BẦU TRỜI SAO TRÔI NỔI & LẤP LÁNH LIÊN TỤC
        // ----------------------------------------------------
        const starsContainer = document.getElementById('starsContainer');
        
        // Tạo 120 vì sao lấp lánh tĩnh
        for (let i = 0; i < 120; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.setProperty('--duration', (Math.random() * 3 + 1.5) + 's');
            starsContainer.appendChild(star);
        }

        // Tạo 60 hạt bụi sao bay trôi nổi chuyển động liên tục (Stardust)
        for (let i = 0; i < 60; i++) {
            const dust = document.createElement('div');
            dust.classList.add('stardust');
            dust.style.width = (Math.random() * 2 + 1.5) + 'px';
            dust.style.height = dust.style.width;
            dust.style.left = Math.random() * 100 + 'vw';
            dust.style.setProperty('--drift-duration', (Math.random() * 8 + 6) + 's');
            dust.style.setProperty('--drift-x', (Math.random() * 150 - 75) + 'px');
            dust.style.animationDelay = (Math.random() * 8) + 's';
            starsContainer.appendChild(dust);
        }

        // Hàm tạo vệt sao băng ngẫu nhiên thơ mộng
        function createShootingStar() {
            const shootingStar = document.createElement('div');
            shootingStar.classList.add('shooting-star');
            
            const startX = Math.random() * (window.innerWidth) + 200;
            const startY = Math.random() * (window.innerHeight / 2) - 100;
            const duration = Math.random() * 2 + 1.5; 
            
            shootingStar.style.left = startX + 'px';
            shootingStar.style.top = startY + 'px';
            shootingStar.style.animationDuration = duration + 's';
            
            starsContainer.appendChild(shootingStar);
            
            setTimeout(() => {
                shootingStar.remove();
            }, duration * 1000);
        }

        // Kích hoạt chu kỳ sao băng rơi mỗi 3 giây
        setInterval(createShootingStar, 3000);

        // ----------------------------------------------------
        // HIỆU ỨNG TRÁI TIM VỠ TAN THÀNH NGÔI SAO LẤP LÁNH
        // ----------------------------------------------------
        function shatterHeartAndStart(event) {
            const heart = document.getElementById('heartTrigger');
            const rect = heart.getBoundingClientRect();
            
            // Tìm tọa độ trung tâm của trái tim tại thời điểm click
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            // Ký tự mảnh vụn: hỗn hợp các ngôi sao lấp lánh và tim nhỏ
            const particles = ['✨', '⭐', '🌸', '💖', '✨', '✦', '✧'];

            // Tạo 85 hạt nổ tung
            for (let i = 0; i < 85; i++) {
                const particle = document.createElement('span');
                particle.classList.add('shattered-particle');
                
                // Chọn ngẫu nhiên loại hạt
                particle.innerText = particles[Math.floor(Math.random() * particles.length)];
                
                // Set vị trí ban đầu tại tâm trái tim
                particle.style.left = centerX + 'px';
                particle.style.top = centerY + 'px';

                // Tính toán vận tốc bay theo vòng tròn (physics radial force)
                const angle = Math.random() * Math.PI * 2; // Góc ngẫu nhiên 360 độ
                const distance = Math.random() * 280 + 120; // Khoảng cách nổ bay xa từ 120px đến 400px
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;
                const rotation = Math.random() * 720 - 360; // Xoay tự do từ -360 đến 360 độ
                const dur = Math.random() * 0.8 + 0.8; // Thời gian bay của hạt từ 0.8s đến 1.6s

                particle.style.setProperty('--tx', dx + 'px');
                particle.style.setProperty('--ty', dy + 'px');
                particle.style.setProperty('--rot', rotation + 'deg');
                particle.style.setProperty('--exp-dur', dur + 's');
                
                document.body.appendChild(particle);

                // Tự giải phóng bộ nhớ của hạt sau khi hoàn thành animation
                setTimeout(() => {
                    particle.remove();
                }, dur * 1000);
            }

            // Ẩn trái tim và tiêu đề mở đầu đi
            heart.style.display = 'none';
            document.querySelector('#start-screen h1').style.opacity = '0';
            document.querySelector('#start-screen p').style.opacity = '0';

            // Kích hoạt kịch bản phim lãng mạn
            startCinemaMagic();
        }

        // ----------------------------------------------------
        // SETUP DANH SÁCH ẢNH & HIỆU ỨNG QUẢ CẦU 3D TO HƠN
        // ----------------------------------------------------
        const photos = document.querySelectorAll('.photo-item');
        const sphere = document.getElementById('sphere');
        let isSphereFormed = false;

        // 1. Tán loạn ảnh ra không gian 3D ngẫu nhiên ban đầu
        function scatterPhotos() {
            photos.forEach(photo => {
                photo.style.opacity = '1';
                
                const randomX = (Math.random() * 120 - 60) * 10; 
                const randomY = (Math.random() * 120 - 60) * 10;
                const randomZ = (Math.random() * 80 - 40) * 10;
                const randomRot = (Math.random() * 80 - 40);
                
                const transformStr = `translate3d(${randomX}px, ${randomY}px, ${randomZ}px) scale(1) rotate(${randomRot}deg)`;
                photo.style.transform = transformStr;
                photo.dataset.origTransform = transformStr; 
            });
        }

        // 2. Gom hội tụ toàn bộ ảnh thành khối cầu xoay 3D to đẹp
        function formSphere() {
            const isMobile = window.innerWidth <= 600;
            // TĂNG BÁN KÍNH ĐỂ HOÀ HỢP VỚI KÍCH THƯỚC ẢNH ĐÃ TĂNG (Không bị dính chùm)
            const radius = isMobile ? 190 : 300; 
            const total = photos.length;
            
            photos.forEach((photo, index) => {
                const phi = Math.acos(-1 + (2 * index) / total);
                const theta = Math.sqrt(total * Math.PI) * phi;

                const x = radius * Math.sin(phi) * Math.cos(theta);
                const y = radius * Math.sin(phi) * Math.sin(theta);
                const z = radius * Math.cos(phi);

                const rotY = theta * 180 / Math.PI;
                const rotX = 90 - phi * 180 / Math.PI;

                const transformStr = `translate3d(${x}px, ${y}px, ${z}px) rotateY(${rotY}deg) rotateX(${rotX}deg) scale(1)`;
                photo.style.transform = transformStr;
                photo.dataset.origTransform = transformStr; 
                
                photo.dataset.dragX = '0';
                photo.dataset.dragY = '0';
            });

            // Chế độ tự động xoay lãng mạn trong không gian cầu
            let angle = 0;
            setInterval(() => {
                angle += 0.22;
                if (!isDragging) {
                    sphere.style.transform = `rotateY(${angle}deg) rotateX(${angle / 4}deg)`;
                }
            }, 30);

            isSphereFormed = true;
        }

        // ----------------------------------------------------
        // HỆ THỐNG KÉO THẢ TƯƠNG TÁC ĐA CHẠM SIÊU MƯỢT
        // ----------------------------------------------------
        let activeDragItem = null;
        let startPointerX, startPointerY;
        let originalDragX = 0, originalDragY = 0;
        let isDragging = false;

        photos.forEach(photo => {
            photo.addEventListener('pointerdown', dragStart);
        });

        window.addEventListener('pointermove', dragMove);
        window.addEventListener('pointerup', dragEnd);
        window.addEventListener('pointercancel', dragEnd);

        function dragStart(e) {
            if (!isSphereFormed) return; 
            
            activeDragItem = e.currentTarget;
            activeDragItem.style.transition = 'none'; 
            activeDragItem.style.zIndex = '999'; 
            
            activeDragItem.setPointerCapture(e.pointerId); 
            
            startPointerX = e.clientX;
            startPointerY = e.clientY;
            
            originalDragX = parseFloat(activeDragItem.dataset.dragX) || 0;
            originalDragY = parseFloat(activeDragItem.dataset.dragY) || 0;
            
            isDragging = true;
        }

        function dragMove(e) {
            if (!isDragging || !activeDragItem) return;
            e.preventDefault();
            
            const deltaX = e.clientX - startPointerX;
            const deltaY = e.clientY - startPointerY;
            
            const currentDragX = originalDragX + deltaX;
            const currentDragY = originalDragY + deltaY;
            
            activeDragItem.dataset.dragX = currentDragX;
            activeDragItem.dataset.dragY = currentDragY;
            
            const origTransform = activeDragItem.dataset.origTransform || '';
            // Nâng ảnh lên cao hơn (Z-axis = 180px) khi kéo tạo chiều sâu cực xịn
            activeDragItem.style.transform = `${origTransform} translate3d(${currentDragX}px, ${currentDragY}px, 180px) scale(1.25)`;
        }

        function dragEnd(e) {
            if (!isDragging || !activeDragItem) return;
            isDragging = false;
            
            activeDragItem.releasePointerCapture(e.pointerId);
            activeDragItem.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 2s';
            
            activeDragItem = null;
        }

        // ----------------------------------------------------
        // KỊCH BẢN ĐIỆN ẢNH CHUYỂN PHÂN CẢNH TỪNG CHƯƠNG
        // ----------------------------------------------------
        function startCinemaMagic() {
            // Khởi chạy nhạc nền
            document.getElementById('bgMusic').play().catch(() => console.log("Yêu cầu duyệt tương tác trước"));

            const startScreen = document.getElementById('start-screen');
            const text1 = document.getElementById('text-1');
            const text2 = document.getElementById('text-2');

            // Đợi hạt nổ tỏa ra rực rỡ (1.2s) rồi mới dẹp hẳn màn hình chờ
            setTimeout(() => {
                startScreen.style.opacity = '0';
                setTimeout(() => startScreen.style.display = 'none', 1500);
            }, 1200);

            // --- GIÂY 2.0: Xuất hiện lời dẫn 1 ---
            setTimeout(() => {
                text1.classList.add('active');
            }, 2000);

            // --- GIÂY 5.0: Nhòe mờ lời dẫn 1 ---
            setTimeout(() => {

            // --- GIÂY 11.2: Bung tỏa ảnh lộng lẫy bay bổng ---
            setTimeout(() => {
                scatterPhotos();
            }, 11200);

            // --- GIÂY 15.2: Gom xếp thành quả cầu 3D khổng lồ xoay tròn ---
            setTimeout(() => {
                formSphere();
            }, 15200);

            // --- GIÂY 17.8: Hiện tên và nút mở thư tay ấm áp ---
            setTimeout(() => {
                document.getElementById('main-name').style.opacity = '1';
                document.getElementById('btn-open-letter').style.opacity = '1';
            }, 17800);
        }

        // ----------------------------------------------------
        // HIỆU ỨNG GÕ CHỮ TRONG LÁ THƯ TAY (TYPEWRITER MECHANICS)
        // ----------------------------------------------------
        const fullLetterHTML = `Hôm nay 01-06-2025 Là ngày "Quốc tế thiếu nhi".<br><br>Embee bé nhỏ của anh, anh chúc embee có một ngày vui vẻ, hạnh phúc và mãi là embee của anh, chúc cho đôi mình bên nhau thật bền lâu.<br><br>Happy to you 1 day vui vẻ ạ ❤️<br><br><span style="font-size: 0.95rem; color: #ccb3d1; font-style: italic;">(lâu rồi không làm mong em tạm chấp nhận nhé ^^)</span>`;
        
        let typewriterActiveTimer = null;

        function runSafeTypewriter(element, htmlText, speed) {
            element.innerHTML = ""; 
            let charIndex = 0;
            
            const cursor = document.createElement('span');
            cursor.classList.add('typewriter-cursor');
            element.appendChild(cursor);

            function type() {
                if (charIndex < htmlText.length) {
                    if (htmlText.charAt(charIndex) === '<') {
                        const closingTagIndex = htmlText.indexOf('>', charIndex);
                        if (closingTagIndex !== -1) {
                            const tagMarkup = htmlText.substring(charIndex, closingTagIndex + 1);
                            cursor.insertAdjacentHTML('beforebegin', tagMarkup);
                            charIndex = closingTagIndex + 1;
                        } else {
                            cursor.insertAdjacentText('beforebegin', htmlText.charAt(charIndex));
                            charIndex++;
                        }
                    } else {
                        cursor.insertAdjacentText('beforebegin', htmlText.charAt(charIndex));
                        charIndex++;
                    }
                    typewriterActiveTimer = setTimeout(type, speed);
                } else {
                    cursor.style.display = 'none';
                }
            }
            type();
        }

        // Đóng / Mở Modal Thư Kính Mờ
        function toggleLetter(show) {
            const modal = document.getElementById('letter-modal');
            const contentBox = document.getElementById('letterText');
            
            if (typewriterActiveTimer) {
                clearTimeout(typewriterActiveTimer);
            }

            if (show) {
                modal.classList.add('show');
                setTimeout(() => {
                    runSafeTypewriter(contentBox, fullLetterHTML, 45); 
                }, 200);
            } else {
                modal.classList.remove('show');
                contentBox.innerHTML = ""; 
            }
        }
    </script>
